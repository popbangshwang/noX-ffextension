<!DOCTYPE html>
<html>
  <head>
    <title>noX-ffextension</title>
    <link rel="stylesheet" href="css/popup.css">
  </head>
  <body>
    <div class="header">
      <h2>noX-ffextension</h2>
      <button id="configBtn" class="config-btn" title="Open settings">
        <img src="/settings.svg" alt="Settings" />
      </button>
    </div>

    <div class="toggle-section">
      <label class="toggle-switch">
        <input id="extensionToggle" type="checkbox" checked />
        <span class="slider"></span>
      </label>
      <span id="toggleStatus">Extension enabled</span>
    </div>

    <script src="js/popup.js"></script>
  </body>
</html>
